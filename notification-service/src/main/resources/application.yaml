server:
  port: 8085

spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
        group-id: notification-service
        auto-offset-reset: earliest
        enable-auto-commit: false

    producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
        properties:
          spring.json.add.type.headers: false
    listener:
      ack-mode: record

  datasource:
    url: jdbc:postgresql://localhost:5432/notification_service_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration/schema
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  internal:
    token: library-internal-token-123
  kafka:
    topics:
      book-borrowed: book-borrowed-events
      book-returned: book-returned-events
      fine-paid: fine-paid-events

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org.mariaelvin.library.notification_service: DEBUG
    org.springframework.web: INFO
