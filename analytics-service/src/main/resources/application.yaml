server:
  port: 8090

spring:
  application:
    name: analytics-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

services:
  user-service:
    url: http://localhost:8082
  book-service:
    url: http://localhost:8083
  borrow-service:
    url: http://localhost:8084
  notification-service:
    url: http://localhost:8085

jwt:
  secret: BVvt2Q2OaZHShF3oCXuRVVTDEPkdu0e6KAvgOriLCA5TH9mDqPI94L81U24gyUT9vKyN0v5i2WbSPpiegonSQD
  expiration: 86400000

app:
  security:
    trust-gateway-headers: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.mariaelvin.library.analytics_service: INFO