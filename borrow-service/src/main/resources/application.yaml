server:
  port: 8084

spring:
  cloud:
    openfeign:
      okhttp:
        enabled: true

  application:
    name: borrow-service

  datasource:
    url: jdbc:postgresql://localhost:5432/borrow_service_db
    username: postgres
    password: admin

  flyway:
    enabled: true
    locations: classpath:db/migration/schema
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret: BVvt2Q2OaZHShF3oCXuRVVTDEPkdu0e6KAvgOriLCA5TH9mDqPI94L81U24gyUT9vKyN0v5i2WbSPpiegonSQD
  expiration: 86400000

services:
  book-service:
    url: http://localhost:8083
  notification-service:
    url: http://localhost:8085


app:
  internal:
    token: library-internal-token-123
  borrow:
    default-borrow-days: 14
    fine-per-day: 10.00

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG