server:
  port: 8084

spring:
  cloud:
    openfeign:
      okhttp:
        enabled: true
      client:
        config:
          book-service:
            connectTimeout: 2000
            readTimeout: 5000
            loggerLevel: BASIC
  kafka:
    bootstrap-servers: localhost:9092
    producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
        properties:
          spring.json.add.type.headers: false



  application:
    name: borrow-service

  datasource:
    url: jdbc:postgresql://localhost:5432/borrow_service_db
    username: postgres
    password: admin

  flyway:
    enabled: true
    locations: classpath:db/migration/schema
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret: BVvt2Q2OaZHShF3oCXuRVVTDEPkdu0e6KAvgOriLCA5TH9mDqPI94L81U24gyUT9vKyN0v5i2WbSPpiegonSQD
  expiration: 86400000

services:
  book-service:
    url: http://localhost:8083

resilience4j:
  circuitbreaker:
    instances:
      bookService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

  retry:
    instances:
      bookServiceReadRetry:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - feign.RetryableException
          - feign.FeignException$InternalServerError
          - feign.FeignException$BadGateway
          - feign.FeignException$ServiceUnavailable
          - feign.FeignException$GatewayTimeout


app:
  kafka:
    topics:
      book-borrowed: book-borrowed-events
      book-returned: book-returned-events
      fine-paid: fine-paid-events
  internal:
    token: library-internal-token-123
  borrow:
    default-borrow-days: 14
    fine-per-day: 10.00

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG